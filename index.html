<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#f4f5f9" />
    <meta name="description" content="Uma Pokédex para as pessoas da tua vida." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Porcadex" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Porcadex</title>
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('porcadex.theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          }
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
